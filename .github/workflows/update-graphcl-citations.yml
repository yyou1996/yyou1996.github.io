name: Update GraphCL citations

on:
  workflow_dispatch:

  schedule:
    # Every Monday at 6:32 AM, China time
    - cron: "32 6 * * 1"
      timezone: "Asia/Shanghai"

permissions:
  contents: write

concurrency:
  group: update-graphcl-citations
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Update citation total
        env:
          SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}
        run: python scripts/update_graphcl_citations.py

      - name: Commit updated citation total
        run: |
          if git diff --quiet -- _pages/about.md; then
            echo "Citation count is unchanged."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add _pages/about.md
          git commit -m "Update GraphCL citation count"
          git push
